<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyAcceleration | 学習ノート</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
  <div class="inner">
    <a class="home" href="index.html">📚 StudyAcceleration</a>
    <span class="crumb">統計検定 準1級 × 英語語彙</span>
  </div>
</header>

<main>
  <h1>学習ノート ホーム</h1>
  <p class="lead">読み物として通読でき、触って理解できるインタラクティブノート。テーマ名・タグ・説明文で検索できます。すべてローカル動作・外部通信なし。</p>

  <div class="search-wrap">
    <input id="search" type="search" placeholder="🔍 検索 (例: 正規分布 / p値 / 語根 / フラッシュカード)" autocomplete="off">
  </div>
  <p id="no-hit" class="no-hit">該当するテーマがありません。別のキーワードを試してください。</p>

  <section id="sec-stats">
    <div class="cat-head"><h2>📊 統計検定 準1級</h2></div>
    <div class="card-grid" id="grid-stats"></div>
  </section>

  <section id="sec-eng">
    <div class="cat-head"><h2>🇬🇧 英語(語彙)</h2></div>
    <div class="card-grid" id="grid-eng"></div>
  </section>

  <h2>使い方メモ</h2>
  <p>「準備中」のカードは今後追加予定の枠。<code>data/topics.js</code> に1件追加+ページを作れば目次と検索に自動反映されます。フラッシュカードの学習記録はこのブラウザ内(localStorage)にのみ保存されます。</p>
</main>

<script src="data/topics.js"></script>
<script src="assets/app.js"></script>
<script>renderIndex();</script>
</body>
</html>
